apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payflow-api
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.payflow.example
      secretName: payflow-api-tls
  rules:
    - host: api.payflow.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: payflow-api
                port:
                  name: http
