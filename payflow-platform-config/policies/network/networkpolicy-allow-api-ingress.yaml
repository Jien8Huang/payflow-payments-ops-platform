# Allow the NGINX Ingress controller to reach the API Service (adjust namespace/labels to match your cluster).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: payflow-api-ingress-from-nginx
  labels:
    app.kubernetes.io/part-of: payflow
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: payflow-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
