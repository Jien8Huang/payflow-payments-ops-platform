name: payflow-platform-config

on:
  push:
    branches: [main]
    paths:
      - "payflow-platform-config/**"
      - "scripts/ci/**"
      - ".github/workflows/platform-config.yml"
  pull_request:
    paths:
      - "payflow-platform-config/**"
      - "scripts/ci/**"
      - ".github/workflows/platform-config.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: install python deps (PyYAML)
        run: python3 -m pip install --upgrade pip pyyaml

      - name: install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: lint yaml (syntax)
        run: scripts/ci/lint-yaml.sh

      - name: render overlays (kustomize)
        run: scripts/ci/validate-platform-config.sh

