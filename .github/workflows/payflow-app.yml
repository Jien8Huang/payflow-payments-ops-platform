name: payflow-app

on:
  push:
    branches: [main]
    paths:
      - "payflow-app/**"
      - ".github/workflows/payflow-app.yml"
  pull_request:
    paths:
      - "payflow-app/**"
      - ".github/workflows/payflow-app.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: payflow-app

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: payflow-app/go.mod
          cache-dependency-path: payflow-app/go.sum

      - name: gofmt
        run: test -z "$(gofmt -s -l .)"

      - name: go vet
        run: go vet ./...

      - name: go mod verify
        run: go mod verify

      - name: go test
        run: go test ./... -count=1

  docker-build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: build api image (local)
        run: docker build -f Dockerfile --target api -t payflow-api:ci .

      - name: build worker image (local)
        run: docker build -f Dockerfile --target worker -t payflow-worker:ci .

      - name: trivy scan api image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: payflow-api:ci
          format: table
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: trivy scan worker image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: payflow-worker:ci
          format: table
          exit-code: "1"
          severity: "CRITICAL,HIGH"
