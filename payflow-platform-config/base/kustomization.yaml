apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: payflow
labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
resources:
  - namespace.yaml
  - serviceaccount-api.yaml
  - serviceaccount-worker.yaml
  - deployment-api.yaml
  - deployment-worker.yaml
  - service-api.yaml
  - ingress-api.yaml
  - pdb-api.yaml
  - hpa-api.yaml
