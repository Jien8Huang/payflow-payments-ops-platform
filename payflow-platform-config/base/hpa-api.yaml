apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payflow-api
  labels:
    app.kubernetes.io/name: payflow-api
    app.kubernetes.io/part-of: payflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payflow-api
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
